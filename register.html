<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EchoVault Rewards - Register</title>


<style>

body{

margin:0;

font-family:Arial,sans-serif;

background:#f5f5f5;

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

}


.card{

width:90%;

max-width:400px;

background:#fff;

padding:25px;

border-radius:15px;

box-shadow:0 4px 15px rgba(0,0,0,.1);

}


h2{

text-align:center;

margin-bottom:20px;

}


input{

width:100%;

padding:12px;

margin-bottom:12px;


    border:1px solid #ddd;
    border-radius:10px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#4f46e5;
    color:#fff;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

p{
    text-align:center;
}
</style>
</head>
<body>

<div class="card">
    <h2>Create Account</h2>

    <input type="text" id="fullName" placeholder="Full Name">

    <input type="text" id="username" placeholder="Username">

    <input type="text" id="referralCode" placeholder="Referral Code (Optional)">

    <input type="email" id="email" placeholder="Email">

    <input type="password" id="password" placeholder="Password">

    <button onclick="register()">Register</button>

    <p>
        Already have an account?
        <a href="login.html">Login</a>
    </p>
</div>

<script type="module">
import { createClient }
from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabase = createClient(
    'https://tlhifdnifblurluhnhln.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRsaGlmZG5pZmJsdXJsdWhuaGxuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3OTc3NTIsImV4cCI6MjA5NzM3Mzc1Mn0.uCb8hs7wqj__q-zIEquy7snEiWxx10jXHNoP0Ey3dyo'
);

window.register = async function(){

    const fullName =
    document.getElementById("fullName").value.trim();

    const username =
    document.getElementById("username").value.trim();

    const referralCode =
    document.getElementById("referralCode").value.trim();

    const email =
    document.getElementById("email").value.trim();

    const password =
    document.getElementById("password").value;

    if(!fullName || !username || !email || !password){
        alert("Please complete all required fields.");
        return;
    }

    const { data, error } =
    await supabase.auth.signUp({
        email,
        password,
        options:{
            emailRedirectTo: "https://ppc-vault.netlify.app/dashboard.html",
            data:{
                full_name: fullName,
                username: username
            }
        }
    });

    if(error){
        alert(error.message);
        return;
    }

    if(referralCode && data.user){

        await supabase
        .from("profiles")
        .update({
            referred_by: referralCode
        })
        .eq("id", data.user.id);

    }

    alert("Registration successful! Please check your email.");

    window.location.href="login.html";
}
</script>

</body>
</html>
