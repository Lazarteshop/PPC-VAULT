<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<style>
body{font-family:Arial;padding:20px;background:#f5f5f5}
.card{background:white;padding:15px;margin-bottom:10px;border-radius:10px}
button{padding:8px 12px;border:none;border-radius:8px;cursor:pointer}
.approve{background:green;color:white}
</style>

<body>

<h2>Deposit Requests</h2>

<div id="list"></div>
<div id="withdrawList"></div>
  
<script type="module">
  async function loadWithdrawals(){

const { data } = await supabase
.from("withdrawals")
.select("*")
.eq("status","pending");

const container = document.getElementById("withdrawList");
container.innerHTML = "";

data.forEach(w => {

container.innerHTML += `
<div class="card">
<p>User: ${w.user_id}</p>
<p>Amount: ₱${w.amount}</p>
<button onclick="approveWithdraw('${w.id}')">Approve</button>
</div>
`;

});

}

window.approveWithdraw = async function(id){

const user = await supabase.auth.getUser();

await supabase.rpc("approve_withdrawal", {
wd_id: id,
admin_id: user.data.user.id
});

alert("Withdrawal approved!");
loadWithdrawals();

  }

loadWithdrawals();

// load deposits
async function loadDeposits(){

const { data } = await supabase
.from('deposits')
.select('*')
.eq('status','pending');

const container = document.getElementById('list');
container.innerHTML = '';

data.forEach(d => {

container.innerHTML += `
<div class="card">
<p>User: ${d.user_id}</p>
<p>Amount: ₱${d.amount}</p>
<button class="approve" onclick="approve('${d.id}')">Approve</button>
</div>
`;

});

}

window.approve = async function(id){

const user = await supabase.auth.getUser();

await supabase.rpc('approve_deposit', {
dep_id: id,
admin_id: user.data.user.id
});

alert('Approved!');
loadDeposits();

}
