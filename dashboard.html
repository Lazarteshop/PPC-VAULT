<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body{
    font-family:Arial;
    background:#f4f6f8;
    margin:0;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    margin-bottom:15px;
}

.balance{
    font-size:28px;
    font-weight:bold;
    color:#4f46e5;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:10px;
    background:#4f46e5;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

    <div class="card">
        <h2>EchoVault Wallet</h2>
        <p>Email: <span id="email"></span></p>
    </div>

    <div class="card">
        <h3>Wallet Balance</h3>
        <div class="balance">₱ <span id="balance">0.00</span></div>
        <small>Total Earnings: ₱ <span id="earned">0.00</span></small>
    </div>
<div class="card">
    <h3>Withdraw Funds</h3>

    <input type="number" id="withdrawAmount" placeholder="Enter amount">

    <button onclick="withdraw()">Request Withdrawal</button>
</div>
    
    <div class="card">
        <button onclick="logout()">Logout</button>
    </div>

</div>

<script type="module">
    function getReferralRate(amount){
    if(amount >= 2000) return 0.10;
    if(amount >= 1000) return 0.08;
    if(amount >= 500) return 0.07;
    if(amount >= 200) return 0.05;
    return 0;
    }
    async function withdraw(){

    const amount = parseFloat(
        document.getElementById("withdrawAmount").value
    );

    const user = (await supabase.auth.getUser()).data.user;

    const { data: wallet } = await supabase
    .from("wallets")
    .select("*")
    .eq("user_id", user.id)
    .single();

    if(amount > wallet.balance){
        alert("Insufficient balance");
        return;
        }

    await supabase.from("withdrawals").insert({
        user_id: user.id,
        amount: amount
    });

    alert("Withdrawal request sent!");
}
    async function processDeposit(deposit){

    const amount = deposit.amount;

    const rate = getReferralRate(amount);

    if(rate <= 0) return;

    // get invitee profile
    const { data: profile } = await supabase
    .from("profiles")
    .select("*")
    .eq("id", deposit.user_id)
    .single();

        if(!profile?.referred_by) return;

    const bonus = amount * rate;

    // update referrer's wallet
    await supabase
    .from("wallets")
    .update({
        balance: supabase.raw(`balance + ${bonus}`),
        total_earned: supabase.raw(`total_earned + ${bonus}`)
    })
    .eq("user_id", profile.referred_by);

    // log earnings
    await supabase
    .from("referral_earnings")
    .insert({
     referrer_id: profile.referred_by,
        invitee_id: deposit.user_id,
        deposit_id: deposit.id,
        amount: bonus,
        rate: rate * 100
    });
    }
    async function deposit(amount){

    const user = (await supabase.auth.getUser()).data.user;

    await supabase.from("deposits").insert({
        user_id: user.id,
        amount: amount,
        status: "pending"
    });

    alert("Deposit request submitted!");
    }

);

// Check session
const { data:{ session } } = await supabase.auth.getSession();

if(!session){
    window.location.href = "login.html";
}

const user = session.user;

// show email
document.getElementById("email").textContent = user.email;

// fetch wallet
const { data: wallet, error } = await supabase

.select("*")
.eq("user_id", user.id)
.single();

if(wallet){
    document.getElementById("balance").textContent = wallet.balance.toFixed(2);
    document.getElementById("earned").textContent = wallet.total_earned.toFixed(2);

// logout
window.logout = async function(){
    await supabase.auth.signOut();
    window.location.href = "login.html";
}
</script>

</body>
</html>
